<svg xmlns="http://www.w3.org/2000/svg" width="320" height="100" viewBox="0 0 320 100">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <!-- Card background with fold corner -->
  <path d="M12,0 L296,0 Q308,0 308,12 L308,88 Q308,100 296,100 L12,100 Q0,100 0,88 L0,12 Q0,0 12,0 Z" fill="#f9f9f9" filter="url(#shadow)"/>
  <rect x="0.5" y="0.5" width="307" height="99" rx="11.5" fill="none" stroke="#d3d3d3" stroke-width="1"/>

  <!-- Fold corner top-right -->
  <path d="M296,0 L320,24 L308,12 Q308,0 296,0 Z" fill="#e0e0e0"/>
  <path d="M296,0 L320,24" fill="none" stroke="#c8c8c8" stroke-width="0.8"/>

  <!-- Checkbox (checked state) -->
  <rect x="20" y="32" width="36" height="36" rx="3" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
  <rect x="20" y="32" width="36" height="36" rx="3" fill="rgba(52,168,83,0.08)" stroke="#ccc" stroke-width="1.5"/>
  <!-- Green checkmark -->
  <polyline points="28,51 36,59 52,41" fill="none" stroke="#34A853" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "I'm not a robot" text -->
  <text x="68" y="55" font-family="-apple-system, Arial, sans-serif" font-size="18" font-weight="500" fill="#1a1a1a">I'm not a robot</text>

  <!-- reCAPTCHA icon (circular arrows) -->
  <g transform="translate(254, 22)">
    <!-- Outer arc top-right -->
    <path d="M22,6 A18,18 0 0,1 36,22" fill="none" stroke="#4285F4" stroke-width="5" stroke-linecap="round"/>
    <!-- Arrow tip top -->
    <polygon points="22,0 30,10 14,10" fill="#4285F4"/>
    <!-- Outer arc bottom-left -->
    <path d="M14,38 A18,18 0 0,1 0,22" fill="none" stroke="#4285F4" stroke-width="5" stroke-linecap="round"/>
    <!-- Arrow tip bottom -->
    <polygon points="14,44 6,34 22,34" fill="#4285F4"/>
    <!-- Center leaf -->
    <ellipse cx="18" cy="22" rx="7" ry="10" fill="#4285F4" transform="rotate(-20,18,22)"/>
    <ellipse cx="18" cy="22" rx="4" ry="7" fill="#f9f9f9" transform="rotate(-20,18,22)"/>
  </g>

  <!-- "reCAPTCHA" + "HUMAN driver" text -->
  <text x="248" y="74" font-family="-apple-system, Arial, sans-serif" font-size="9" font-weight="700" fill="#555" letter-spacing="0.5" text-anchor="middle">HUMAN</text>
  <text x="248" y="85" font-family="-apple-system, Arial, sans-serif" font-size="9" fill="#555" letter-spacing="2" text-anchor="middle">driver</text>
</svg>
